name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vigiscam
          POSTGRES_PASSWORD: vigiscam
          POSTGRES_DB: vigiscam_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U vigiscam"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://vigiscam:vigiscam@localhost:5432/vigiscam_test?schema=public
      CORS_ORIGINS: http://localhost:3001
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Apply database migrations
        run: npx prisma migrate deploy
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: E2E tests
        run: npm run test:e2e

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit (SCA)
        run: npm audit --audit-level=high
      # SAST (CodeQL) and secret scanning are added as a dedicated workflow in Phase 1.

  docker:
    name: Container Image Build
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t vigiscam-backend:${{ github.sha }} .

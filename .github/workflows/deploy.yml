name: Deploy

# Manually triggered deploy to the Azure dev environment.
# Once stable, a `push: branches: [main]` trigger can be added for auto-deploy.
on:
  workflow_dispatch:

permissions:
  id-token: write # required for Azure OIDC login
  contents: read

jobs:
  deploy:
    name: Deploy to Azure Container Apps (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Password-free login via OIDC federated credential.
      # Requires repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies
        run: npm ci

      # ── Database migrations ──────────────────────────────────────────────
      # PostgreSQL is firewalled; briefly allow this runner's IP, apply the
      # migrations, then close the rule again (always, even on failure).
      # Requires: repo variable POSTGRES_SERVER, repo secret DATABASE_URL.
      - name: Open temporary DB firewall for the runner
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az postgres flexible-server firewall-rule create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.POSTGRES_SERVER }} \
            --rule-name gh-deploy-temp \
            --start-ip-address "$RUNNER_IP" --end-ip-address "$RUNNER_IP"

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Close temporary DB firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --name ${{ vars.POSTGRES_SERVER }} \
            --rule-name gh-deploy-temp --yes || true

      # ── Application rollout ──────────────────────────────────────────────
      # Build the image inside Azure Container Registry. Requires var ACR_NAME.
      - name: Build & push image
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image vigiscam-backend:${{ github.sha }} \
            --image vigiscam-backend:latest \
            .

      # Roll the new image out. Requires vars CONTAINER_APP_NAME, RESOURCE_GROUP.
      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/vigiscam-backend:${{ github.sha }}

      - name: Show backend URL
        run: |
          echo "Backend deployed to:"
          az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv
